name: Send email

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Create enriched briefing
        run: node scripts/daily-briefing.mjs

      - name: Commit updated Obsidian notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "00 - Home/Latest Daily Briefing.md" "01 - Daily Briefings" "dist/briefing.md"
          git diff --cached --quiet || git commit -m "Update daily macro briefing"
          git push

      - name: Send email
        uses: dawidd6/action-send-mail@v3.12.0
        with:
          server_address: ${{ vars.SMTP_SERVER }}
          server_port: ${{ vars.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Daily Macro Briefing
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: file://dist/email.html
